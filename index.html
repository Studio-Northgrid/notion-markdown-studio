<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notion Markdown Studio</title>
<style>
  :root{
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, "Liberation Mono", monospace;

    --bg: #ffffff;
    --text: #1f2328;
    --muted: #59636e;
    --border: #d1d9e0;
    --border-strong: #d0d7de;
    --accent: #0969da;
    --accent-hover: #0860ca;
    --canvas: #eef1f4;
    --canvas-subtle: #f6f8fa;

    --code-bg: #f6f8fa;
    --code-border: #d1d9e0;

    --tok-keyword:  #cf222e;
    --tok-string:   #0a3069;
    --tok-comment:  #6e7781;
    --tok-number:   #0550ae;
    --tok-function: #8250df;
    --tok-builtin:  #0550ae;
    --tok-literal:  #0550ae;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body{
    font-family: var(--sans);
    color: var(--text);
    background: var(--canvas);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Toolbar ---------- */
  header{
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    z-index: 5;
  }
  .brand{ display:flex; align-items:center; gap:9px; margin-right:auto; }
  .brand .dot{ width:18px; height:18px; border-radius:5px; background:linear-gradient(135deg,#0969da,#8250df); }
  .brand b{ font-weight:600; font-size:14px; letter-spacing:-.01em; }
  .brand span{ font-size:12px; color:var(--muted); }

  .btn{
    font-family: inherit; font-size: 13px; font-weight: 500;
    color: var(--text); background: var(--bg);
    border: 1px solid var(--border-strong); border-radius: 7px;
    padding: 6px 12px; cursor: pointer; display:inline-flex; align-items:center; gap:6px;
    transition: background .12s ease, border-color .12s ease;
  }
  .btn:hover{ background: var(--canvas-subtle); }
  .btn:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; }
  .btn.primary{ color:#fff; background:var(--accent); border-color:rgba(0,0,0,.06); }
  .btn.primary:hover{ background:var(--accent-hover); }
  .btn svg{ width:15px; height:15px; }
  .pagecount{ font-size:12px; color:var(--muted); margin-left:4px; min-width:60px; }

  /* ---------- Main split ---------- */
  main{ flex:1 1 auto; display:flex; min-height:0; }
  .editor-pane{
    flex: 1 1 46%; min-width: 0; display:flex; flex-direction:column;
    background: var(--bg); border-right: 1px solid var(--border);
    position: relative;
  }
  .pane-label{
    font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase;
    color:var(--muted); padding:9px 16px 7px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  #editor{
    width:100%; height:100%; border:0; outline:0; resize:none;
    font-family: var(--mono); font-size: 13.5px; line-height: 1.7;
    color: transparent; caret-color: var(--text); background: transparent;
    padding: 18px 20px; tab-size: 2;
    position:relative; z-index:2;
  }
  #editor::placeholder{ color:#8c959f; }
  #editorHL{
    position:absolute; top:0; left:0; right:0; bottom:0;
    font-family: var(--mono); font-size: 13.5px; line-height: 1.7;
    padding: 18px 20px; tab-size: 2;
    margin:0; border:0; white-space:pre-wrap; word-wrap:break-word;
    overflow-y:auto; pointer-events:none; z-index:1;
    scrollbar-width:none;
    color: var(--text); background: var(--bg);
  }
  #editorHL .hl-h1{ color:#0550ae; font-weight:700; }
  #editorHL .hl-h2{ color:#0969da; font-weight:600; }
  #editorHL .hl-h3{ color:#6639ba; font-weight:600; }
  #editorHL .hl-h4{ color:#8250df; }
  #editorHL .hl-h5{ color:#8250df; }
  #editorHL .hl-h6{ color:#59636e; }
  .editor-pane.drag::after{
    content:"Markdown-Datei hier ablegen";
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(9,105,218,.06); border:2px dashed var(--accent); margin:8px; border-radius:10px;
    font-size:14px; font-weight:600; color:var(--accent); pointer-events:none;
  }

  .preview-pane{
    flex: 1 1 54%; min-width:0; overflow-y:auto; background: var(--canvas);
    padding: 26px 26px 60px;
  }

  /* ---------- A4 document ---------- */
  .page{
    position:relative;
    background:#fff; width:210mm; max-width:100%;
    height:297mm; overflow:hidden;
    margin: 0 auto; padding: 18mm 16mm;
    box-shadow: 0 1px 3px rgba(0,0,0,.10), 0 10px 28px rgba(31,35,40,.10);
    border-radius: 3px;
    font-size: 11pt; line-height: 1.65; color: var(--text);
    word-wrap: break-word;
  }
  .page-num{
    display:flex; align-items:center; gap:12px;
    font-size:11px; color:var(--muted); font-weight:500;
    margin: 16px auto 40px; max-width:210mm; letter-spacing:.04em;
    white-space:nowrap;
  }
  .page-num::before, .page-num::after{
    content:""; flex:1 1 auto; height:0;
    border-top:1px dashed #aeb8c2;
  }
  .empty-hint{ color:var(--muted); text-align:center; font-size:14px; padding:40px 0; }

  .page h1,.page h2,.page h3,.page h4,.page h5,.page h6{
    line-height:1.25; margin:1.4em 0 .6em; font-weight:600; border-bottom:none;
  }
  .page h1{ font-size:1.9em; padding-bottom:.3em; border-bottom:1px solid var(--border); margin-top:.2em; color:#0550ae; }
  .page h2{ font-size:1.45em; color:#0969da; }
  .page h3{ font-size:1.2em; color:#6639ba; }
  .page h4{ font-size:1em; color:#8250df; }
  .page h5{ font-size:.9em; }
  .page h6{ font-size:.85em; color:var(--muted); }
  .page p{ margin:.55em 0; }
  .page a{ color:var(--accent); text-decoration:none; }
  .page a:hover{ text-decoration:underline; }
  .page strong{ font-weight:600; }
  .page img{ max-width:100%; border-radius:4px; }
  .page ul,.page ol{ margin:.5em 0; padding-left:1.7em; }
  .page li{ margin:.2em 0; }
  .page li.task-item{ list-style:none; margin-left:-1.4em; }
  .page li.task-item input{ margin-right:.5em; vertical-align:middle; }
  .page hr{ height:1px; background:var(--border-strong); border:0; margin:1.6em 0; }
  .page blockquote{
    margin:.8em 0; padding:.1em 1em; color:var(--muted);
    border-left:3px solid var(--border-strong);
  }
  .page blockquote p{ margin:.4em 0; }

  .page table{ border-collapse:collapse; margin:.9em 0; font-size:.95em; width:auto; }
  .page th,.page td{ border:1px solid var(--border-strong); padding:6px 13px; min-width:2.4em; }
  .page td:empty::after,.page th:empty::after{ content:"\00a0"; }
  .page th{ background:var(--canvas-subtle); font-weight:600; text-align:left; }
  .page tr:nth-child(2n) td{ background:#fbfcfd; }

  /* inline code */
  .page .inline-code{
    font-family:var(--mono); font-size:.86em;
    background:rgba(129,139,152,.18); padding:.18em .38em; border-radius:5px;
  }

  /* ---------- Code blocks: Notion layout + GitHub colors ---------- */
  .code-wrap{ position:relative; margin:1em 0; }
  .code-lang{
    position:absolute; top:8px; right:10px; z-index:1;
    font-family:var(--mono); font-size:10.5px; letter-spacing:.04em; text-transform:lowercase;
    color:var(--muted); background:#fff; border:1px solid var(--border);
    padding:1px 7px; border-radius:5px; user-select:none;
  }
  pre.code-block{
    margin:0; background:var(--code-bg); border:1px solid var(--code-border);
    border-radius:8px; padding:15px 16px; overflow-x:auto;
  }
  pre.code-block code{
    font-family:var(--mono); font-size:12.5px; line-height:1.55;
    color:#1f2328; white-space:pre; display:block;
  }
  .tok-keyword{ color:var(--tok-keyword); }
  .tok-string{ color:var(--tok-string); }
  .tok-comment{ color:var(--tok-comment); font-style:italic; }
  .tok-number{ color:var(--tok-number); }
  .tok-function{ color:var(--tok-function); }
  .tok-builtin{ color:var(--tok-builtin); }
  .tok-literal{ color:var(--tok-literal); }

  /* ---------- Responsive ---------- */
  @media (max-width: 880px){
    main{ flex-direction:column; }
    .editor-pane{ flex:1 1 45%; border-right:0; border-bottom:1px solid var(--border); }
    .preview-pane{ flex:1 1 55%; padding:16px; }
    .page{ padding:14mm 10mm; }
    .brand span{ display:none; }
  }

  /* ---------- Print ---------- */
  @media print{
    @page{ size:A4; margin:0; }
    *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
    html,body{ height:auto; overflow:visible; background:#fff; display:block; }
    header,.editor-pane,.pane-label{ display:none !important; }
    main{ display:block; }
    .preview-pane{ overflow:visible; background:#fff; padding:0; }
    .page{
      width:auto; max-width:none; height:auto; overflow:visible;
      margin:0; padding:18mm 16mm;
      box-shadow:none; border-radius:0; break-after:page; font-size:11pt;
    }
    .page:last-child{ break-after:auto; }
    .page-num{ display:none; }
    pre.code-block{ break-inside:avoid; overflow:visible; }
    pre.code-block code{ white-space:pre-wrap; word-wrap:break-word; }
    .page h1,.page h2,.page h3{ break-after:avoid; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="dot"></div>
    <b>Notion Markdown Studio</b>
    <span>· Markdown rein, sauberes PDF raus</span>
  </div>

  <button class="btn" id="uploadBtn" title="Markdown-Datei öffnen">
    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5 4.5 5H7v5h2V5h2.5L8 1.5ZM2.75 11A.75.75 0 0 0 2 11.75v1.5c0 .41.34.75.75.75h10.5a.75.75 0 0 0 .75-.75v-1.5a.75.75 0 0 0-1.5 0v.75h-9v-.75A.75.75 0 0 0 2.75 11Z"/></svg>
    Öffnen
  </button>
  <input type="file" id="fileInput" accept=".md,.markdown,.txt,text/markdown" hidden>

  <button class="btn" id="breakBtn" title="Seitenumbruch an Cursor einfügen">
    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 3.5A.75.75 0 0 1 2.75 3h10.5a.75.75 0 0 1 0 1.5H2.75A.75.75 0 0 1 2 3.5Zm0 9a.75.75 0 0 1 .75-.75h10.5a.75.75 0 0 1 0 1.5H2.75A.75.75 0 0 1 2 12.5ZM2 8a.75.75 0 0 1 .75-.75h2.5a.75.75 0 0 1 0 1.5h-2.5A.75.75 0 0 1 2 8Zm8.5 0a.75.75 0 0 1 .75-.75h2a.75.75 0 0 1 0 1.5h-2A.75.75 0 0 1 10.5 8Z"/></svg>
    Seitenumbruch
  </button>

  <button class="btn" id="clearBtn" title="Editor leeren">Leeren</button>

  <button class="btn primary" id="printBtn" title="Als PDF drucken (Strg/Cmd + P)">
    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M5 1.75C5 .78 5.78 0 6.75 0h2.5C10.22 0 11 .78 11 1.75V3h1.75A2.25 2.25 0 0 1 15 5.25v3.5A2.25 2.25 0 0 1 12.75 11H11v3.25c0 .41-.34.75-.75.75h-4.5a.75.75 0 0 1-.75-.75V11H3.25A2.25 2.25 0 0 1 1 8.75v-3.5A2.25 2.25 0 0 1 3.25 3H5V1.75Zm1.5.75V3h3V1.75A.25.25 0 0 0 9.25 1.5h-2.5a.25.25 0 0 0-.25.25Zm0 10v1.5h3V10h-3v2.5Z"/></svg>
    PDF / Drucken
  </button>

  <span class="pagecount" id="pageCount">0 Seiten</span>
</header>

<main>
  <section class="editor-pane" id="editorPane">
    <div class="pane-label"><span>Markdown</span><span id="charCount">0 Zeichen</span></div>
    <div id="editorWrap" style="position:relative;flex:1 1 auto;min-height:0;overflow:hidden;">
      <pre id="editorHL" aria-hidden="true"></pre>
      <textarea id="editor" spellcheck="false" placeholder="Notion-Markdown hier einfügen oder eine .md-Datei oben öffnen.

Tipp: Export in Notion über  ···  →  Export  →  Markdown &amp; CSV.
Seitenumbruch setzen mit dem Button oben oder per  &lt;!-- pagebreak --&gt;"></textarea>
    </div>
  </section>

  <section class="preview-pane" id="previewPane">
    <div id="preview"></div>
  </section>
</main>

<script>
/* ============================================================
   Markdown -> HTML + GitHub-colored syntax highlighter
   ============================================================ */
function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const KW = {
  javascript: ['const','let','var','function','return','if','else','for','while','do','switch','case','break','continue','new','class','extends','super','this','typeof','instanceof','in','of','await','async','yield','try','catch','finally','throw','import','export','from','as','default','delete','void','static','get','set'],
  typescript: ['const','let','var','function','return','if','else','for','while','do','switch','case','break','continue','new','class','extends','implements','interface','type','enum','super','this','typeof','instanceof','in','of','await','async','yield','try','catch','finally','throw','import','export','from','as','default','delete','void','static','get','set','public','private','protected','readonly','namespace'],
  python: ['def','return','if','elif','else','for','while','break','continue','class','import','from','as','with','try','except','finally','raise','pass','lambda','yield','global','nonlocal','assert','del','in','is','not','and','or','async','await','match','case'],
  bash: ['if','then','else','elif','fi','for','in','do','done','while','case','esac','function','return','exit','export','local','readonly','declare','source','echo','cd','set','unset'],
  sql: ['SELECT','FROM','WHERE','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','ALTER','DROP','JOIN','LEFT','RIGHT','INNER','OUTER','ON','GROUP','BY','ORDER','HAVING','LIMIT','OFFSET','AS','AND','OR','NOT','NULL','PRIMARY','KEY','FOREIGN','REFERENCES','DISTINCT','UNION','INDEX','DEFAULT','UNIQUE','CASE','WHEN','THEN','END'],
  css: [], json: [], html: [], default: []
};
const LIT = {
  javascript: ['true','false','null','undefined','NaN','Infinity'],
  typescript: ['true','false','null','undefined','NaN','Infinity','string','number','boolean','any','void','never','unknown'],
  python: ['True','False','None','self','cls'],
  bash: ['true','false'],
  sql: ['TRUE','FALSE'],
  default: ['true','false','null']
};
const BUILTIN = {
  javascript: ['console','Math','JSON','Object','Array','String','Number','Boolean','Promise','Date','document','window','parseInt','parseFloat','setTimeout','fetch'],
  typescript: ['console','Math','JSON','Object','Array','Promise','Date','document','window'],
  python: ['print','len','range','int','str','float','list','dict','set','tuple','bool','open','enumerate','zip','map','filter','sum','min','max','sorted','type'],
  default: []
};

function langKey(l){
  l = (l||'').toLowerCase().trim();
  const map = { js:'javascript', jsx:'javascript', node:'javascript',
    ts:'typescript', tsx:'typescript', py:'python', python3:'python',
    sh:'bash', shell:'bash', zsh:'bash', console:'bash',
    yml:'json', yaml:'json', scss:'css', less:'css',
    xml:'html', svg:'html', vue:'html',
    postgres:'sql', postgresql:'sql', mysql:'sql', sqlite:'sql' };
  if(map[l]) return map[l];
  if(KW[l]) return l;
  return 'default';
}
function esc0(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function ruleSet(key){
  const lineComment = (key==='python'||key==='bash') ? '#'
                    : (key==='sql') ? '--'
                    : (key==='css'||key==='json') ? null : '//';
  const rules = [];
  if(lineComment) rules.push({t:'comment', re:new RegExp(esc0(lineComment)+'[^\\n]*','y')});
  rules.push({t:'comment', re:/\/\*[\s\S]*?\*\//y});
  if(key==='python') rules.push({t:'string', re:/"""[\s\S]*?"""|'''[\s\S]*?'''/y});
  rules.push({t:'string', re:/"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'|`(?:\\.|[^`\\])*`/y});
  rules.push({t:'number', re:/\b\d[\d_]*(?:\.\d+)?(?:[eE][+-]?\d+)?\b/y});
  rules.push({t:'word',   re:/[A-Za-z_$][\w$]*/y});
  rules.push({t:'ws',     re:/\s+/y});
  rules.push({t:'other',  re:/[^A-Za-z0-9_$\s]+/y});
  return rules;
}
function highlight(code, lang){
  const key = langKey(lang);
  const rules = ruleSet(key);
  const kws = new Set(KW[key]||KW.default);
  const lits = new Set(LIT[key]||LIT.default);
  const builtins = new Set(BUILTIN[key]||BUILTIN.default);
  const ci = (key==='sql');
  let out='', i=0;
  while(i<code.length){
    let matched=false;
    for(const r of rules){
      r.re.lastIndex=i; const m=r.re.exec(code);
      if(m && m.index===i && m[0].length>0){
        const text=m[0]; let type=r.t;
        if(type==='word'){
          const probe = ci ? text.toUpperCase() : text;
          if(kws.has(probe)) type='keyword';
          else if(lits.has(text)||lits.has(probe)) type='literal';
          else if(builtins.has(text)) type='builtin';
          else if(/^\s*\(/.test(code.slice(i+text.length))) type='function';
          else type=null;
        } else if(type==='ws'||type==='other'){ type=null; }
        out += type ? '<span class="tok-'+type+'">'+esc(text)+'</span>' : esc(text);
        i += text.length; matched=true; break;
      }
    }
    if(!matched){ out += esc(code[i]); i++; }
  }
  return out;
}

function parseInline(text){
  const codes=[];
  text = text.replace(/`([^`]+)`/g,(m,c)=>{codes.push(c);return '\u0000'+(codes.length-1)+'\u0000';});
  text = esc(text);
  text = text.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g,(m,a,s)=>'<img alt="'+a+'" src="'+s+'">');
  text = text.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g,(m,t,u)=>'<a href="'+u+'" target="_blank" rel="noopener">'+t+'</a>');
  text = text.replace(/\*\*\*([^*]+)\*\*\*/g,'<strong><em>$1</em></strong>');
  text = text.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  text = text.replace(/__([^_]+)__/g,'<strong>$1</strong>');
  text = text.replace(/(^|[^*])\*([^*\s][^*]*?)\*(?!\*)/g,'$1<em>$2</em>');
  text = text.replace(/(^|[^A-Za-z0-9_])_([^_]+)_(?![A-Za-z0-9_])/g,'$1<em>$2</em>');
  text = text.replace(/~~([^~]+)~~/g,'<del>$1</del>');
  text = text.replace(/\u0000(\d+)\u0000/g,(m,n)=>'<code class="inline-code">'+esc(codes[+n])+'</code>');
  return text;
}

function indentOf(line){ let n=0; for(const ch of line){ if(ch===' ')n++; else if(ch==='\t')n+=4; else break; } return n; }

function buildList(items){
  let i=0;
  function helper(min){
    let out=''; let open=null;
    while(i<items.length && items[i].indent>=min){
      const it=items[i]; const type=it.ordered?'ol':'ul';
      if(open===null){ out+='<'+type+'>'; open=type; }
      else if(open!==type){ out+='</'+open+'><'+type+'>'; open=type; }
      const cls = it.checked!==null ? ' class="task-item"' : '';
      const box = it.checked!==null ? '<input type="checkbox" disabled'+(it.checked?' checked':'')+'> ' : '';
      out += '<li'+cls+'>'+box+parseInline(it.text);
      i++;
      if(i<items.length && items[i].indent>it.indent){ out+=helper(it.indent+1); }
      out+='</li>';
    }
    if(open) out+='</'+open+'>';
    return out;
  }
  return helper(0);
}

function parseMarkdown(src){
  src = src.replace(/\r\n?/g,'\n');
  const lines = src.split('\n');
  let html=''; let i=0;
  const isBlank = s => s.trim()==='';
  while(i<lines.length){
    const line = lines[i];
    if(/^<!--\s*pagebreak\s*-->\s*$/.test(line.trim())){ html+='<div class="pagebreak"></div>'; i++; continue; }
    if(isBlank(line)){ i++; continue; }

    const fence = line.match(/^\s*(```|~~~)([^`]*)$/);
    if(fence){
      const lang = fence[2].trim(); i++; const buf=[];
      while(i<lines.length && !/^\s*(```|~~~)\s*$/.test(lines[i])){ buf.push(lines[i]); i++; }
      i++;
      const code = buf.join('\n');
      const label = lang ? '<div class="code-lang">'+esc(lang)+'</div>' : '';
      html += '<div class="code-wrap">'+label+'<pre class="code-block"><code>'+highlight(code,lang)+'</code></pre></div>';
      continue;
    }

    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if(h){ const lvl=h[1].length; html+='<h'+lvl+'>'+parseInline(h[2].trim())+'</h'+lvl+'>'; i++; continue; }

    if(/^\s*([-*_])(\s*\1){2,}\s*$/.test(line)){ html+='<hr>'; i++; continue; }

    if(/^\s*>\s?/.test(line)){
      const buf=[];
      while(i<lines.length && /^\s*>\s?/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      html += '<blockquote>'+parseMarkdown(buf.join('\n'))+'</blockquote>'; continue;
    }

    if(line.includes('|') && i+1<lines.length &&
       /^\s*\|?[\s:|-]*-[\s:|-]*\|?\s*$/.test(lines[i+1]) && lines[i+1].includes('-')){
      const splitRow = r => { let s=r.trim(); if(s.startsWith('|'))s=s.slice(1); if(s.endsWith('|'))s=s.slice(0,-1);
        return s.split('|').map(c=>c.trim()); };
      const header = splitRow(line);
      const cols = header.length;
      const aligns = splitRow(lines[i+1]).map(c=>{ const l=c.startsWith(':'),r=c.endsWith(':'); return l&&r?'center':r?'right':l?'left':''; });
      i+=2; const rows=[];
      while(i<lines.length && lines[i].includes('|') && !isBlank(lines[i])){ rows.push(splitRow(lines[i])); i++; }
      const cell = (val, tag, k) => {
        const al = aligns[k] ? ' style="text-align:'+aligns[k]+'"' : '';
        const inner = parseInline((val==null?'':val).trim());
        return '<'+tag+al+'>'+(inner===''?'&nbsp;':inner)+'</'+tag+'>';
      };
      let t='<table><thead><tr>';
      for(let k=0;k<cols;k++) t+=cell(header[k],'th',k);
      t+='</tr></thead><tbody>';
      rows.forEach(r=>{ t+='<tr>'; for(let k=0;k<cols;k++) t+=cell(r[k],'td',k); t+='</tr>'; });
      t+='</tbody></table>'; html+=t; continue;
    }

    if(/^\s*([-*+]|\d+\.)\s+/.test(line)){
      const items=[];
      while(i<lines.length){
        const m = lines[i].match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
        if(m){
          let text=m[3]; let checked=null;
          const cb=text.match(/^\[([ xX])\]\s+(.*)$/);
          if(cb){ checked = cb[1].toLowerCase()==='x'; text=cb[2]; }
          items.push({ indent:indentOf(lines[i]), ordered:/\d/.test(m[2]), text, checked }); i++;
        } else if(!isBlank(lines[i]) && indentOf(lines[i])>0 && items.length){
          items[items.length-1].text += ' ' + lines[i].trim(); i++;
        } else break;
      }
      const uniq=[...new Set(items.map(x=>x.indent))].sort((a,b)=>a-b);
      const lvl=new Map(uniq.map((v,k)=>[v,k]));
      items.forEach(x=>x.indent=lvl.get(x.indent));
      html += buildList(items); continue;
    }

    const para=[];
    while(i<lines.length && !isBlank(lines[i]) &&
          !/^\s*(```|~~~)/.test(lines[i]) && !/^(#{1,6})\s/.test(lines[i]) &&
          !/^\s*>\s?/.test(lines[i]) && !/^\s*([-*+]|\d+\.)\s+/.test(lines[i]) &&
          !/^\s*([-*_])(\s*\1){2,}\s*$/.test(lines[i]) &&
          !/^<!--\s*pagebreak\s*-->\s*$/.test(lines[i].trim())){
      para.push(lines[i]); i++;
    }
    html += '<p>'+parseInline(para.join('\n').trim()).replace(/\n/g,'<br>')+'</p>';
  }
  return html;
}

/* ============================================================
   App
   ============================================================ */
const editor   = document.getElementById('editor');
const editorHL = document.getElementById('editorHL');
const preview  = document.getElementById('preview');
const pageCount= document.getElementById('pageCount');
const charCount= document.getElementById('charCount');
const editorPane = document.getElementById('editorPane');

/* ---- Editor heading highlight ---- */
function highlightEditor(){
  const text = editor.value;
  const lines = text.split('\n');
  let out = '';
  for(let i=0;i<lines.length;i++){
    const ln = lines[i];
    const m = ln.match(/^(#{1,6})\s/);
    if(m){
      const lvl = m[1].length;
      out += '<span class="hl-h'+lvl+'">' + esc(ln) + '</span>';
    } else {
      out += esc(ln);
    }
    if(i < lines.length-1) out += '\n';
  }
  editorHL.innerHTML = out + '\n';
}
editor.addEventListener('scroll', ()=>{ editorHL.scrollTop = editor.scrollTop; });

function newPage(){ const p=document.createElement('div'); p.className='page'; return p; }

function render(){
  const md = editor.value;
  highlightEditor();
  charCount.textContent = md.length.toLocaleString('de-DE') + ' Zeichen';
  preview.innerHTML = '';

  if(md.trim()===''){
    const p = newPage();
    p.innerHTML = '<div class="empty-hint">Noch nichts zu zeigen — füge links dein Markdown ein.</div>';
    preview.appendChild(p);
    pageCount.textContent = '0 Seiten';
    return;
  }

  // Each manual <!-- pagebreak --> forces a new sheet; within a section the
  // content auto-flows into A4 sheets, breaking when a page is full.
  const sections = md.split(/<!--\s*pagebreak\s*-->/i);
  let pageEl;
  const startPage = ()=>{ pageEl = newPage(); preview.appendChild(pageEl); };

  sections.forEach(section=>{
    startPage();
    const temp = document.createElement('div');
    temp.innerHTML = parseMarkdown(section);
    Array.from(temp.children).forEach(block=>{
      pageEl.appendChild(block);
      if(pageEl.scrollHeight > pageEl.clientHeight + 1 && pageEl.childElementCount > 1){
        pageEl.removeChild(block);   // doesn't fit -> push to next sheet
        startPage();
        pageEl.appendChild(block);
      }
    });
  });

  // page-number captions under each sheet
  const pages = preview.querySelectorAll('.page');
  pages.forEach((pg, idx)=>{
    const cap = document.createElement('div');
    cap.className = 'page-num';
    cap.textContent = '✂  A4-Seite ' + (idx+1) + ' / ' + pages.length;
    pg.after(cap);
  });
  pageCount.textContent = pages.length + (pages.length===1 ? ' Seite' : ' Seiten');
}

let renderTimer = null;
function scheduleRender(){ clearTimeout(renderTimer); renderTimer = setTimeout(render, 130); }

editor.addEventListener('input', scheduleRender);

/* Tab inserts two spaces instead of leaving the field */
editor.addEventListener('keydown', e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=editor.selectionStart, en=editor.selectionEnd;
    editor.setRangeText('  ', s, en, 'end');
    render();
  }
});

/* Toolbar actions */
document.getElementById('breakBtn').addEventListener('click', ()=>{
  const s=editor.selectionStart, e=editor.selectionEnd;
  const ins='\n\n<!-- pagebreak -->\n\n';
  editor.setRangeText(ins, s, e, 'end');
  editor.focus(); render();
});

document.getElementById('clearBtn').addEventListener('click', ()=>{
  if(editor.value==='' || confirm('Editor wirklich leeren?')){ editor.value=''; render(); editor.focus(); }
});

document.getElementById('printBtn').addEventListener('click', ()=> window.print());

const fileInput = document.getElementById('fileInput');
document.getElementById('uploadBtn').addEventListener('click', ()=> fileInput.click());
fileInput.addEventListener('change', ()=>{
  const f = fileInput.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = ()=>{ editor.value = reader.result; render(); };
  reader.readAsText(f);
  fileInput.value='';
});

/* Drag & drop a .md file onto the editor */
['dragenter','dragover'].forEach(ev=> editorPane.addEventListener(ev, e=>{ e.preventDefault(); editorPane.classList.add('drag'); }));
['dragleave','drop'].forEach(ev=> editorPane.addEventListener(ev, e=>{ e.preventDefault(); if(ev==='dragleave' && e.relatedTarget && editorPane.contains(e.relatedTarget)) return; editorPane.classList.remove('drag'); }));
editorPane.addEventListener('drop', e=>{
  const f = e.dataTransfer.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = ()=>{ editor.value = reader.result; render(); };
  reader.readAsText(f);
});

render();
</script>
</body>
